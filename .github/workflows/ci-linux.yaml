name: Linux CI

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  # Allows manual triggering of the workflow
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"

      # Only run in this linux based runner
      - name: Check Formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            gofmt -l .
            exit 1
          fi

      - name: Run tests
        run: make test
