version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aperture
    binary: aperture
    main: ./cmd/aperture
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Tag}}
      - -X main.buildCommit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

    # leaving this here for when windows builds are supported
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
